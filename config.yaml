# Property Pipeline Configuration
# Edit this file to customise your sourcing criteria.

scraper:
  # UK towns, cities, or postcodes to search
  target_areas:
    - Birmingham
    - Manchester
    - Leeds
    - Nottingham
    - Sheffield
    - Liverpool
    - Bradford
    - Leicester

  price:
    min: 50000
    max: 250000

  # Run at a specific time each day (24-hour format, e.g. "08:00")
  # If set, this takes priority over interval_minutes.
  # Set to "" or remove to use interval_minutes instead.
  run_at: "00:00"
  timezone: "Europe/London"   # handles GMT/BST automatically

  # Interval in minutes between scrape runs (used only if run_at is not set)
  interval_minutes: 60

  # Seconds to wait between HTTP requests (be polite to servers)
  request_delay: 3

analysis:
  # Minimum Below Market Value percentage to PASS
  min_bmv_percent: 15

  # Minimum gross rental yield percentage to PASS
  min_gross_yield: 7.0

  # Assumed costs as % of rent (management, maintenance, insurance, voids)
  assumed_costs_percent: 25

crm:
  # Hours before flagging an investor who hasn't responded
  follow_up_hours: 48

deals:
  # Default sourcing fee in £
  sourcing_fee: 3000

  # Payment terms to include in Sourcing Agreement
  payment_terms: "50% on exchange of contracts, 50% on completion"

alerts:
  # Set to true to send the daily digest email
  email_enabled: true

  # Keywords that flag a property as an investment opportunity.
  # The scraper searches for these on each portal AND scans descriptions.
  # Properties matching any keyword are highlighted at the top of the email.
  opportunity_keywords:
    # Needs work / distressed
    - refurbishment
    - renovation
    - modernisation
    - needs updating
    - requires updating
    - in need of
    - needs work
    - tlc
    - project
    - dated
    - tired
    - as seen
    - sold as seen
    - structural
    - damp
    - uninhabitable
    - derelict
    # Motivated seller
    - no chain
    - chain free
    - vacant possession
    - probate
    - executor
    - quick sale
    - must sell
    - cash buyer
    - cash buyers only
    - reduced
    - motivated
    # Worst home on best street / upside
    - scope for
    - potential to extend
    - planning permission
    - development opportunity
    - below market
    - investment opportunity
