<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Property Pipeline{% endblock %}</title>
  <style>
    :root {
      --navy: #1a3a5c;
      --navy-light: #2a5080;
      --green: #27ae60;
      --red: #e74c3c;
      --amber: #f39c12;
      --bg: #f4f6f9;
      --card: #ffffff;
      --text: #2c3e50;
      --muted: #7f8c8d;
      --border: #e0e6ed;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
           background: var(--bg); color: var(--text); min-height: 100vh; }

    /* Sidebar */
    .sidebar {
      position: fixed; top: 0; left: 0; width: 220px; height: 100vh;
      background: var(--navy); color: #fff; display: flex; flex-direction: column;
      z-index: 100;
    }
    .sidebar-logo {
      padding: 20px 16px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .sidebar-logo h1 { font-size: 1rem; font-weight: 700; color: #fff; }
    .sidebar-logo p { font-size: 0.7rem; color: #aac4e4; margin-top: 2px; }
    .sidebar-nav { padding: 12px 0; flex: 1; }
    .sidebar-nav a {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px; color: #aac4e4; text-decoration: none;
      font-size: 0.875rem; transition: all 0.15s;
    }
    .sidebar-nav a:hover, .sidebar-nav a.active {
      background: rgba(255,255,255,0.1); color: #fff;
      border-left: 3px solid var(--green);
    }
    .sidebar-nav a .icon { font-size: 1rem; width: 18px; text-align: center; }

    /* Main content */
    .main { margin-left: 220px; padding: 24px; min-height: 100vh; }
    .page-header { margin-bottom: 24px; }
    .page-header h2 { font-size: 1.5rem; color: var(--navy); }
    .page-header p { color: var(--muted); margin-top: 4px; font-size: 0.875rem; }

    /* Cards */
    .card {
      background: var(--card); border-radius: 8px; padding: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06); border: 1px solid var(--border);
    }
    .card-title { font-size: 0.8rem; font-weight: 600; color: var(--muted);
                  text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
    .card-value { font-size: 2rem; font-weight: 700; color: var(--navy); }
    .card-sub { font-size: 0.8rem; color: var(--muted); margin-top: 2px; }

    /* Stats grid */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 24px; }

    /* Tables */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    th { background: var(--navy); color: #fff; padding: 10px 12px; text-align: left;
         font-weight: 600; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.04em; }
    td { padding: 10px 12px; border-bottom: 1px solid var(--border); }
    tr:hover td { background: #f9fbff; }

    /* Badges */
    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 12px;
      font-size: 0.72rem; font-weight: 600; text-transform: uppercase;
    }
    .badge-green { background: #d5f5e3; color: #1e8449; }
    .badge-red { background: #fdecea; color: #c0392b; }
    .badge-amber { background: #fef9e7; color: #a04000; }
    .badge-blue { background: #eaf4fb; color: #1a5276; }
    .badge-gray { background: #f2f3f4; color: #566573; }

    /* Pipeline columns */
    .pipeline-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 12px;
    }
    .pipeline-col { background: var(--card); border-radius: 8px; padding: 12px;
                    border: 1px solid var(--border); min-height: 300px; }
    .pipeline-col-header {
      font-size: 0.75rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.05em; color: var(--muted); margin-bottom: 10px;
      padding-bottom: 8px; border-bottom: 2px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
    }
    .pipeline-card {
      background: var(--bg); border-radius: 6px; padding: 10px;
      margin-bottom: 8px; font-size: 0.8rem; border: 1px solid var(--border);
    }
    .pipeline-card .price { font-weight: 700; color: var(--navy); }
    .pipeline-card .address { color: var(--muted); margin-top: 2px; }
    .pipeline-card .bmv { color: var(--green); font-weight: 600; }

    /* Forms */
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 4px; color: var(--text); }
    input, select, textarea {
      width: 100%; padding: 8px 12px; border: 1px solid var(--border);
      border-radius: 6px; font-size: 0.875rem; color: var(--text);
      transition: border-color 0.15s;
    }
    input:focus, select:focus, textarea:focus {
      outline: none; border-color: var(--navy); box-shadow: 0 0 0 2px rgba(26,58,92,0.1);
    }
    .btn {
      display: inline-block; padding: 8px 18px; border-radius: 6px;
      font-size: 0.875rem; font-weight: 600; cursor: pointer;
      text-decoration: none; border: none; transition: all 0.15s;
    }
    .btn-primary { background: var(--navy); color: #fff; }
    .btn-primary:hover { background: var(--navy-light); }
    .btn-success { background: var(--green); color: #fff; }
    .btn-sm { padding: 4px 10px; font-size: 0.78rem; }

    /* Alerts */
    .alert { padding: 10px 14px; border-radius: 6px; margin-bottom: 16px; font-size: 0.875rem; }
    .alert-success { background: #d5f5e3; color: #1e8449; border: 1px solid #a9dfbf; }
    .alert-danger { background: #fdecea; color: #c0392b; border: 1px solid #f1948a; }

    /* Filters bar */
    .filters { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; align-items: flex-end; }
    .filters input, .filters select { width: auto; }

    @media (max-width: 900px) {
      .sidebar { position: relative; width: 100%; height: auto; }
      .main { margin-left: 0; }
      .pipeline-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <nav class="sidebar">
    <div class="sidebar-logo">
      <h1>🏠 Property Pipeline</h1>
      <p>UK Deal Sourcing System</p>
    </div>
    <div class="sidebar-nav">
      <a href="{{ url_for('index') }}" class="{{ 'active' if request.endpoint == 'index' }}">
        <span class="icon">📊</span> Dashboard
      </a>
      <a href="{{ url_for('properties') }}" class="{{ 'active' if request.endpoint == 'properties' }}">
        <span class="icon">🔍</span> Properties
      </a>
      <a href="{{ url_for('pipeline') }}" class="{{ 'active' if request.endpoint == 'pipeline' }}">
        <span class="icon">📋</span> Deal Pipeline
      </a>
      <a href="{{ url_for('investors') }}" class="{{ 'active' if request.endpoint == 'investors' }}">
        <span class="icon">👥</span> Investors
      </a>
      <a href="{{ url_for('add_investor') }}" class="{{ 'active' if request.endpoint == 'add_investor' }}">
        <span class="icon">➕</span> Add Investor
      </a>
    </div>
  </nav>

  <main class="main">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ 'success' if category == 'success' else 'danger' }}">
          {{ message }}
        </div>
      {% endfor %}
    {% endwith %}

    {% block content %}{% endblock %}
  </main>
</body>
</html>
